<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vouchers - Claw Machine Admin</title>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.webp">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/home.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css">
    <link href="https://cdn.datatables.net/v/bs5/jq-3.7.0/jszip-3.10.1/dt-2.1.8/b-3.2.0/b-colvis-3.2.0/b-html5-3.2.0/b-print-3.2.0/r-3.0.3/datatables.min.css" rel="stylesheet">

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const baseUrl = (path = "") => {
            return `http://127.0.0.1:8000/api/v1/game/${path}`
        }
    </script>
</head>
<body class="bg-light">
    <div id="sidenav" class="position-relative vh-100 overflow-auto shadow bg-white show">
        <div class="p-3 my-3 text-center fw-bold fs-2"><i class="ri-user-settings-line"></i> Administrator</div>
        <hr class="w-50 mx-auto my-3" />
        <a href="index.html" class="sidenav-item text-dark fw-bold"><i class="ri-home-line"></i>&nbsp; Dashboard</a>
        <a href="users.html" class="sidenav-item text-dark fw-bold"><i class="ri-group-line"></i>&nbsp; Pengguna</a>
        <a href="vouchers.html" class="sidenav-item text-dark fw-bold active"><i class="ri-ticket-line"></i>&nbsp; Voucher</a>
        <a href="rewards.html" class="sidenav-item text-dark fw-bold"><i class="ri-gift-line"></i>&nbsp; Hadiah</a>
        <a href="settings.html" class="sidenav-item text-dark fw-bold"><i class="ri-settings-line"></i>&nbsp; Pengaturan</a>
    </div>

    <div id="main" class="position-relative vh-100 overflow-auto">
        <div id="topnav" class="p-3 fw-bold d-flex align-items-center justify-content-between">
            <div class="fs-4 d-flex align-items-center">
                <i class="ri-ticket-line me-2"></i> Voucher
            </div>
        </div>
        <div class="p-3">
            <!-- Counters -->
            <div class="row g-3 mb-4">
                <div class="col-md-3">
                    <div class="card shadow-sm border-0">
                        <div class="card-body">
                            <h6 class="text-muted">Total Voucher</h6>
                            <h3 id="voucher-total" class="counter-amount">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border-0 border-start border-primary border-4">
                        <div class="card-body">
                            <h6 class="text-muted">Unused</h6>
                            <h3 id="voucher-unused" class="counter-amount">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border-0 border-start border-warning border-4">
                        <div class="card-body">
                            <h6 class="text-muted">Used</h6>
                            <h3 id="voucher-used" class="counter-amount">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card shadow-sm border-0 border-start border-success border-4">
                        <div class="card-body">
                            <h6 class="text-muted">Claimed</h6>
                            <h3 id="voucher-claimed" class="counter-amount">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-3 d-flex gap-2">
                <button type="button" data-bs-toggle="modal" data-bs-target="#addVoucherModal" class="btn btn-primary"><i class="ri-add-line"></i>&nbsp; Tambah Voucher</button>
                <button type="button" onclick="Voucher.resetAll()" class="btn btn-warning"><i class="ri-refresh-line"></i>&nbsp; Reset Semua</button>
                <button type="button" onclick="Voucher.deleteAll()" class="btn btn-danger"><i class="ri-delete-bin-line"></i>&nbsp; Hapus Semua</button>
            </div>

            <div class="table-responsive bg-white p-3 rounded shadow-sm">
                <table id="table_voucher" class="table table-bordered table-striped">
                    <thead>
                        <tr>
                            <th style="width: 5%"><input type="checkbox" id="checkedActionAll" onclick="Voucher.unchecked()"></th>
                            <th style="width: 5%">ID</th>
                            <th style="width: 15%">Hadiah</th>
                            <th style="width: 15%">Nama</th>
                            <th style="width: 15%">Kode</th>
                            <th style="width: 10%">Token</th>
                            <th style="width: 10%">Usage</th>
                            <th style="width: 10%">Jenis</th>
                            <th style="width: 10%">Expired</th>
                            <th style="width: 5%">#</th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div class="modal fade" id="addVoucherModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Tambah Voucher</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="add_voucher">
                        <div class="mb-3">
                            <label>Kode Voucher</label>
                            <input type="text" name="code" id="code" class="form-control" required placeholder="Contoh: MERDEKA88">
                        </div>
                        <div class="mb-3">
                            <label>Jumlah Token</label>
                            <input type="number" name="tokens" id="tokens" class="form-control" value="1" min="1">
                        </div>
                        <button type="button" class="btn btn-primary w-100" onclick="Voucher.store()" id="btn_submit">Tambah</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/v/bs5/jq-3.7.0/jszip-3.10.1/dt-2.1.8/b-3.2.0/b-colvis-3.2.0/b-html5-3.2.0/b-print-3.2.0/r-3.0.3/datatables.min.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/voucher.js"></script>
</body>
</html>
