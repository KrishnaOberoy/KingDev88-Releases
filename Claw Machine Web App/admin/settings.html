<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Claw Machine Admin</title>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.webp">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../assets/css/common.css">
    <link rel="stylesheet" href="../assets/css/home.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css">

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        const baseUrl = (path = "") => {
            return `http://127.0.0.1:8000/api/v1/game/${path}`
        }
    </script>
</head>
<body class="bg-light">
    <div id="sidenav" class="position-relative vh-100 overflow-auto shadow bg-white show">
        <div class="p-3 my-3 text-center fw-bold fs-2"><i class="ri-user-settings-line"></i> Administrator</div>
        <hr class="w-50 mx-auto my-3" />
        <a href="index.html" class="sidenav-item text-dark fw-bold"><i class="ri-home-line"></i>&nbsp; Dashboard</a>
        <a href="users.html" class="sidenav-item text-dark fw-bold"><i class="ri-group-line"></i>&nbsp; Pengguna</a>
        <a href="vouchers.html" class="sidenav-item text-dark fw-bold"><i class="ri-ticket-line"></i>&nbsp; Voucher</a>
        <a href="rewards.html" class="sidenav-item text-dark fw-bold"><i class="ri-gift-line"></i>&nbsp; Hadiah</a>
        <a href="settings.html" class="sidenav-item text-dark fw-bold active"><i class="ri-settings-line"></i>&nbsp; Pengaturan</a>
    </div>

    <div id="main" class="position-relative vh-100 overflow-auto">
        <div id="topnav" class="p-3 fw-bold d-flex align-items-center justify-content-between">
            <div class="fs-4 d-flex align-items-center">
                <i class="ri-settings-line me-2"></i> Pengaturan
            </div>
        </div>
        <div class="p-4">
            <div class="row g-4">
                <!-- Site Settings -->
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white fw-bold">Pengaturan Aplikasi</div>
                        <div class="card-body">
                            <form id="form_site">
                                <div class="mb-3">
                                    <label>Nama Aplikasi</label>
                                    <input type="text" name="name" id="name" class="form-control" value="Claw Machine Game">
                                </div>
                                <div class="mb-3">
                                    <label>Logo</label>
                                    <input type="file" name="logo" class="form-control">
                                </div>
                                <button type="button" onclick="Setting.updateSite()" id="btn_site_submit" class="btn btn-primary">Simpan</button>
                            </form>
                        </div>
                    </div>
                </div>
                <!-- Game Settings -->
                <div class="col-md-6">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white fw-bold">Pengaturan Game</div>
                        <div class="card-body">
                            <form id="form_game">
                                <div class="mb-3">
                                    <label>Pesan Menang</label>
                                    <input type="text" name="reward_message_success" id="reward_message_success" class="form-control" value="Selamat! Anda Menang.">
                                </div>
                                <div class="mb-3">
                                    <label>Pesan Zonk</label>
                                    <input type="text" name="reward_message_failed" id="reward_message_failed" class="form-control" value="Maaf, Zonk. Coba Lagi.">
                                </div>
                                <button type="button" onclick="Setting.updateGame()" id="btn_game_submit" class="btn btn-primary">Simpan</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/setting.js"></script>
</body>
</html>
